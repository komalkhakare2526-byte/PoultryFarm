<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marketplace</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
        }

        .container {
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .header h2 {
            margin: 0;
        }

        .back a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .grid {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a8a;
        }

        .farmer {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #16a34a;
            margin: 10px 0;
        }

        .stock {
            font-size: 13px;
            margin-bottom: 10px;
            color: #444;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #1e40af;
        }

        .empty-state {
            text-align: center;
            color: white;
            margin-top: 60px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>🛒 Marketplace</h2>
        <div class="back">
            <a th:href="@{/buyer/dashboard}">← Dashboard</a>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(products)}" class="empty-state">
        <h3>No Products Available</h3>
        <p>Please check back later.</p>
    </div>

    <!-- Product Grid -->
    <div class="grid" th:if="${!#lists.isEmpty(products)}">

        <div class="card" th:each="p : ${products}">
            <div class="product-name" th:text="${p.name}"></div>
            <div class="farmer">
                Sold by <span th:text="${p.farmer.username}"></span>
            </div>

            <div class="price">
                ₹ <span th:text="${p.price}"></span>
            </div>

            <div class="stock">
                Available: <span th:text="${p.quantity}"></span>
            </div>

            <!-- Order Form -->
            <form th:action="@{/buyer/place-order}" method="post">
                <input type="hidden" name="productId" th:value="${p.id}" />

                <input type="number"
                       name="quantity"
                       min="1"
                       th:attr="max=${p.quantity}"
                       placeholder="Enter quantity"
                       required />

                <button type="submit">Place Order</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
