<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 450px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e3a8a;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 5px rgba(37,99,235,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 3px;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>➕ Add Poultry Product</h2>

    <!-- Success Message -->
    <div th:if="${success}" class="success-message">
        Product added successfully!
    </div>

    <form th:action="@{/farmer/save-product}" 
          th:object="${product}" 
          method="post">

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" th:field="*{name}" 
                   placeholder="Ex: Broiler Chicken"
                   required minlength="3">
            <div class="error" th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label>Price (₹ per unit)</label>
            <input type="number" th:field="*{price}" 
                   placeholder="Ex: 250"
                   required min="1">
        </div>

        <div class="form-group">
            <label>Available Quantity</label>
            <input type="number" th:field="*{quantity}" 
                   placeholder="Ex: 100"
                   required min="1">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" th:field="*{location}" 
                   placeholder="Ex: Nashik, Maharashtra"
                   required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}" 
                      placeholder="Short product description"
                      rows="3"></textarea>
        </div>

        <button type="submit">Save Product</button>

    </form>

    <div class="back-link">
        <a th:href="@{/farmer/dashboard}">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
