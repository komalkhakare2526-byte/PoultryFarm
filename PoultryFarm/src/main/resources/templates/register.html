<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | Choline Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-body">

<div class="auth-container">

    <!-- Left Branding Panel -->
    <div class="auth-left">
        <h1>CHOLINE</h1>
        <p>Poultry & Agri Trade Platform</p>
        <span>Empowering Farmers • Buyers • Partners</span>
    </div>

    <!-- Right Form Panel -->
    <div class="auth-right">

        <div class="form-header">
            <h2>Create Account</h2>
            <p>Register to access marketplace, contracts & analytics</p>
        </div>

        <form th:action="@{/saveUser}" th:object="${user}" method="post" class="auth-form">

            <div class="form-grid">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" placeholder="Enter full name">
                    <small th:errors="*{fullName}"></small>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" placeholder="Choose username">
                    <small th:errors="*{username}"></small>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="Create password">
                    <small th:errors="*{password}"></small>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select th:field="*{gender}">
                        <option value="">Select</option>
                        <option th:value="Male">Male</option>
                        <option th:value="Female">Female</option>
                        <option th:value="Other">Other</option>
                    </select>
                    <small th:errors="*{gender}"></small>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" th:field="*{age}">
                    <small th:errors="*{age}"></small>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" th:field="*{phone}">
                    <small th:errors="*{phone}"></small>
                </div>

                <div class="form-group full">
                    <label>Address</label>
                    <input type="text" th:field="*{address}">
                    <small th:errors="*{address}"></small>
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" th:field="*{city}">
                    <small th:errors="*{city}"></small>
                </div>

                <div class="form-group">
                    <label>State</label>
                    <input type="text" th:field="*{state}">
                    <small th:errors="*{state}"></small>
                </div>

                <div class="form-group">
                    <label>Country</label>
                    <input type="text" th:field="*{country}" value="India">
                </div>

                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" th:field="*{pincode}">
                    <small th:errors="*{pincode}"></small>
                </div>

            </div>

            <button type="submit" class="primary-btn">Create Account</button>

        </form>

        <p class="auth-footer">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </p>

    </div>
</div>

</body>
</html>
